name: proxy

services:
  npm:
    image: jc21/nginx-proxy-manager:2.12.6
    container_name: proxy
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "81:81"     # Admin UI; restrict via firewall/security group.
    volumes:
      - ${PROXY_DATA_DIR:-./data}:/data
      - ${PROXY_DATA_DIR:-./data}/letsencrypt:/etc/letsencrypt
    networks:
      - edge
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Cap container log growth; json-file is unbounded by default.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Shared external network; create once with `make network`.
networks:
  edge:
    external: true
    name: edge
