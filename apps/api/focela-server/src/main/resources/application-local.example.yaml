server:
  port: ${FOCELA_SERVER_PORT:48080}

--- #################### Database configuration ####################

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username: ${FOCELA_DRUID_USERNAME:}
        login-password: ${FOCELA_DRUID_PASSWORD:}
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      druid:
        initial-size: 1
        min-idle: 1
        max-active: 20
        max-wait: 60000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 600000
        max-evictable-idle-time-millis: 1800000
        validation-query: SELECT 1
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
        pool-prepared-statements: true
        max-pool-prepared-statement-per-connection-size: 20
      primary: master
      datasource:
        master:
          url: ${FOCELA_DATASOURCE_MASTER_URL:jdbc:postgresql://127.0.0.1:5432/focela-platform}
          driver-class-name: org.postgresql.Driver
          username: ${FOCELA_DATASOURCE_MASTER_USERNAME:root}
          password: ${FOCELA_DATASOURCE_MASTER_PASSWORD:123456}
        slave:
          lazy: true
          url: ${FOCELA_DATASOURCE_SLAVE_URL:jdbc:postgresql://127.0.0.1:5432/focela-platform}
          driver-class-name: org.postgresql.Driver
          username: ${FOCELA_DATASOURCE_SLAVE_USERNAME:root}
          password: ${FOCELA_DATASOURCE_SLAVE_PASSWORD:123456}
  data:
    redis:
      host: ${FOCELA_REDIS_HOST:127.0.0.1}
      port: ${FOCELA_REDIS_PORT:6379}
      database: ${FOCELA_REDIS_DATABASE:0}
      password: ${FOCELA_REDIS_PASSWORD:123456}

--- #################### Scheduled jobs ####################

spring:
  quartz:
    auto-startup: true
    scheduler-name: schedulerName
    job-store-type: jdbc
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org:
        quartz:
          scheduler:
            instanceName: schedulerName
            instanceId: AUTO
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            isClustered: true
            clusterCheckinInterval: 15000
            misfireThreshold: 60000
          threadPool:
            threadCount: 25
            threadPriority: 5
            class: org.quartz.simpl.SimpleThreadPool
    jdbc:
      initialize-schema: NEVER

--- #################### Message queue ####################

rocketmq:
  name-server: ${FOCELA_ROCKETMQ_NAME_SERVER:127.0.0.1:9876}

spring:
  rabbitmq:
    host: ${FOCELA_RABBITMQ_HOST:127.0.0.1}
    port: ${FOCELA_RABBITMQ_PORT:5672}
    username: ${FOCELA_RABBITMQ_USERNAME:rabbit}
    password: ${FOCELA_RABBITMQ_PASSWORD:rabbit}
  kafka:
    bootstrap-servers: ${FOCELA_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
