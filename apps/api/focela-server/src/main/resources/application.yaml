--- #################### Project-specific configuration ####################

focela:
  info:
    version: 1.0.0
    base-package: com.focela.platform
  web:
    admin-ui:
      url: https://platform.focela.com # URL of the admin UI
  xss:
    enable: false
    exclude-urls: # Sample URLs for illustration; removing them is fine.
      - ${spring.boot.admin.context-path}/** # Skip Spring Boot Admin requests
      - ${management.endpoints.web.base-path}/** # Skip Actuator requests
  security:
    permit-all_urls:
      - /admin-api/mp/open/** # WeChat MP open platform callback; no login required.
  api-encrypt:
    enable: true # Enable API encryption
    algorithm: AES # Algorithm — supports AES, RSA, etc.
    request-key: ${FOCELA_API_ENCRYPT_REQUEST_KEY:52549111389893486934626385991395} # [AES example] Request decryption key — must be 16/24/32 bytes. Override in prod via env var.
    response-key: ${FOCELA_API_ENCRYPT_RESPONSE_KEY:96103715984234343991809655248883} # [AES example] Response encryption key — must be 16/24/32 bytes. Override in prod via env var.
#    request-key:  # [RSA example] Request-decryption private key
#    response-key: MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQDh/CHyBcS/zEfVyINVA7+c9Xxl0CPdxPMK1OIjxaLy/7BLfbkoEpI8onQtjuzfpuxCraDem9bu3BMF0pMH95HytI3Vi0kGjaV+WLIalwgc2w37oA2sbsmKzQOP7SDLO5s2QJNAD7kVwd+Q5rqaLu2MO0xVv+0IUJhn83hClC0L5wIDAQAB # [RSA example] Response-encryption public key
  websocket:
    enable: true # WebSocket toggle
    path: /infra/ws # WebSocket path
    sender-type: local # Sender type. Options: local, redis, rocketmq, kafka, rabbitmq.
    sender-rocketmq:
      topic: ${spring.application.name}-websocket # RocketMQ topic for sending
      consumer-group: ${spring.application.name}-websocket-consumer # RocketMQ consumer group
    sender-rabbitmq:
      exchange: ${spring.application.name}-websocket-exchange # RabbitMQ exchange
      queue: ${spring.application.name}-websocket-queue # RabbitMQ queue
    sender-kafka:
      topic: ${spring.application.name}-websocket # Kafka topic for sending
      consumer-group: ${spring.application.name}-websocket-consumer # Kafka consumer group
  swagger:
    title: Focela rapid-development platform
    description: All features for the admin console and user app
    version: ${focela.info.version}
    url: ${focela.web.admin-ui.url}
    email: xingyu4j@vip.qq.com
    license: MIT
    license-url: https://github.com/focela/starter-kit/blob/main/LICENSE
  tenant: # Multi-tenant configuration
    enable: true
    ignore-urls:
      - /jmreport/* # Jimu reports — cannot carry a tenant ID.
    ignore-visit-urls:
      - /admin-api/system/user/profile/**
      - /admin-api/system/auth/**
    ignore-tables:
    ignore-caches:
      - user_role_ids
      - permission_menu_ids
      - oauth_client
      - notify_template
      - mail_account
      - mail_template
      - sms_template
      - iot:device
      - iot:thing_model_list
  sms-code: # SMS verification-code configuration
    expire-times: 10m
    send-frequency: 1m
    send-maximum-quantity-per-day: 10
    begin-code: 9999 # Hard-coded as 9999 for easier testing.
    end-code: 9999 # Hard-coded as 9999 for easier testing.
  trade:
    order:
      pay-expire-time: 2h # Payment expiration
      receive-expire-time: 14d # Receipt expiration
      comment-expire-time: 7d # Comment expiration
      status-sync-to-wxa-enable: true # Whether to sync order status to the WeChat Mini Program
    express:
      client: kd_100
      kd-niao:
        api-key: ${FOCELA_TRADE_EXPRESS_KD_NIAO_API_KEY:cb022f1e-48f1-4c4a-a723-9001ac9676b8}
        business-id: ${FOCELA_TRADE_EXPRESS_KD_NIAO_BUSINESS_ID:1809751}
