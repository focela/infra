spring:
  application:
    name: focela-server

  # Make the project timezone explicit; matches DateUtils.TIME_ZONE_DEFAULT.
  jackson:
    time-zone: GMT+8

  profiles:
    active: local

  main:
    allow-circular-references: true # Allow circular dependencies — unavoidable in this project's three-layer architecture.

  # Servlet configuration
  servlet:
    # File upload configuration
    multipart:
      max-file-size: 16MB # Per-file size limit
      max-request-size: 32MB # Total upload size limit

  # Jackson configuration
  jackson:
    serialization:
      write-dates-as-timestamps: true # Serialize Date as a timestamp
      write-date-timestamps-as-nanoseconds: false # Do not use nanoseconds. e.g., produce 1611460870401 instead of 1611460870.401
      write-durations-as-timestamps: true # Serialize Duration as a timestamp
      fail-on-empty-beans: false # Allow serializing beans with no properties

  # Cache configuration
  cache:
    type: REDIS
    redis:
      time-to-live: 1h # TTL: 1 hour

server:
  servlet:
    encoding:
      enabled: true
      charset: UTF-8 # Must be UTF-8; avoids garbled characters in WebFlux streaming responses (AI scenarios).
      force: true

--- #################### API documentation ####################

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
  default-flat-param-object: true # See https://doc.xiaominfo.com/docs/faq/v4/knife4j-parameterobject-flat-param

knife4j:
  enable: true
  setting:
    language: zh_cn

# Flowable workflow configuration
flowable:
  # 1. false: default — on startup, compare the schema version saved in DB; if mismatched, throw an exception.
  # 2. true: on startup, update all tables; if a table exists, no-op; otherwise create it.
  # 3. create_drop: create tables on startup, drop on shutdown.
  # 4. drop_create: on startup, drop old tables and create new ones.
  database-schema-update: true # Set to false to initialize via https://github.com/flowable/flowable-sql
  db-history-used: true # Flowable 6 defaults to true (generates history tables); no manual setting needed.
  check-process-definitions: false # Disable auto-deploying BPMN XML processes from /resources/processes.
  history-level: audit # Levels: full — keep complete history, including parameters at every node.

# MyBatis Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # Default is true; declared explicitly for clarity.
  global-config:
    db-config:
      id-type: NONE # "Smart" mode — IdTypeEnvironmentPostProcessor adapts to AUTO/INPUT based on the datasource type.
#      id-type: AUTO # Auto-increment ID; suitable for MySQL.
#      id-type: INPUT # User-supplied ID; suitable for Oracle, PostgreSQL, Kingbase, DB2, H2.
#      id-type: ASSIGN_ID # Assigned ID (snowflake by default). For Oracle/PostgreSQL/Kingbase/DB2/H2, remove the @KeySequence annotation from entities.
      logic-delete-value: 1 # Logical-deleted value (default 1)
      logic-not-delete-value: 0 # Logical-not-deleted value (default 0)
    banner: false # Disable banner on console
  type-aliases-package: ${focela.info.base-package}.*.domain.entity
  encryptor:
    password: ${MYBATIS_PLUS_ENCRYPTOR_PASSWORD:XDV71a+xqStEA3WH} # Encryption secret. Override via env var in prod; see docs/TECHNICAL_DEBT.md.

mybatis-plus-join:
  banner: false # Whether to print the mybatis-plus-join banner; default true.
  sub-table-logic: true # Globally enable logical-delete on sub-tables; default true. When disabled, join queries ignore sub-table logical delete.
  ms-cache: true # MappedStatement cache for the interceptor; default true.
  table-alias: t # Table alias (default t)
  logic-del-type: on # Position of the sub-table logical-delete clause: WHERE or ON; default ON.

# Spring Data Redis configuration
spring:
  data:
    redis:
      repositories:
        enabled: false # The project does not use Spring Data Redis repositories; disable to speed up startup.

# VO conversion (data translation)
easy-trans:
  is-enable-global: false # Disabled by default — global translation has noticeable performance cost. It intercepts all SpringMVC ResponseBody for automatic translation. For perf-critical paths, disable globally or use @IgnoreTrans per endpoint.

--- #################### Captcha configuration ####################

aj:
  captcha:
    jigsaw: classpath:images/jigsaw # Slide captcha background image path. Empty uses defaults; "classpath:" reads from resources.
    pic-click: classpath:images/pic-click # Click captcha background image path. Empty uses defaults; "classpath:" reads from resources.
    cache-type: redis # Cache type: local / redis ...
    cache-number: 1000 # Local cache cap; exceeding this clears the cache.
    timing-clear: 180 # Local-cache scheduled cleanup of expired entries (seconds). 0 disables.
    type: blockPuzzle # Captcha type. default = instantiate all three; blockPuzzle = slide-jigsaw; clickWord = click-word; pictureWord = picture-word.
    water-mark: focela # Bottom-right watermark text.
    interference-options: 0 # Slide interference level (0/1/2)
    req-frequency-limit-enable: false # Enable per-minute request-count limit
    req-get-lock-limit: 5 # Lock the get endpoint after 5 failed verifications
    req-get-lock-seconds: 10 # Lockout duration after failure
    req-get-minute-limit: 30 # Per-minute request limit for the get endpoint
    req-check-minute-limit: 60 # Per-minute request limit for the check endpoint
    req-verify-minute-limit: 60 # Per-minute request limit for the verify endpoint

--- #################### Message queue ####################

# rocketmq config (maps to RocketMQProperties)
rocketmq:
  # Producer config
  producer:
    group: ${spring.application.name}_PRODUCER # Producer group

spring:
  # Kafka config (maps to KafkaProperties)
  kafka:
    # Kafka Producer config
    producer:
      acks: 1 # 0 = no ack; 1 = leader ack; all = all leaders and followers ack.
      retries: 3 # Send-failure retry count
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer # Message value serializer
    # Kafka Consumer config
    consumer:
      auto-offset-reset: earliest # Initial offset for the consumer group. See https://blog.csdn.net/lishuangzhe7047/article/details/74530417
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
    # Kafka Consumer Listener configuration
    listener:
      missing-topics-fatal: false # By default the listener errors if a subscribed topic is missing; set false to tolerate.

