spring:
  main:
    lazy-initialization: true # Enable lazy initialization to speed up startup
    banner-mode: off # Unit test: disable Banner

--- #################### Database configuration ####################

spring:
  # Datasource configuration
  datasource:
    name: ruoyi-vue-pro
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=value; # MODE uses MySQL mode; DATABASE_TO_UPPER configures tables and fields to use lowercase
    driver-class-name: org.h2.Driver
    username: sa
    password:
    druid:
      async-init: true # Unit test: asynchronously initialize the Druid connection pool to improve startup speed
      initial-size: 1 # Unit test: set to 1 to improve startup speed
  sql:
    init:
      schema-locations: classpath:/sql/create_tables.sql

  # Redis configuration. Redisson defaults are sufficient; tuning is generally unnecessary
  data:
    redis:
      host: 127.0.0.1 # Address
      port: 16379 # Port (unit test uses port 16379)
      database: 0 # Database index

mybatis:
  lazy-initialization: true # Unit test: enable MyBatis Mapper lazy loading to speed up each unit test

