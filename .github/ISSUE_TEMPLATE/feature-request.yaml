name: Feature Request
description: Propose a new stack, script, or improvement
title: "[Feature] "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe what you want to add and why. For a new stack, include
        the image, ports, data directory, and backup needs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What you want to add or change.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why this is needed. What problem it solves.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: |
        How it could be implemented. For a new stack, note the image,
        ports, data directory, and whether it needs a backup script.
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and what is explicitly out of scope.
    validations:
      required: false
